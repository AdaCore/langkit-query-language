description: Testing the error message when there are multiple instances with the
  same name
driver: gnatcheck
format: brief
input_sources:
- main.adb
tests:
- label: In rule options
  old_rules:
  - +R:same_alias:goto_statements
  - +R:same_alias:integer_types_as_enum
- label: In command-line
  rules:
  - goto_statements
  - goto_statements
- label: In command-line and rule options
  rules:
  - goto_statements
  rule_file: rules.txt
