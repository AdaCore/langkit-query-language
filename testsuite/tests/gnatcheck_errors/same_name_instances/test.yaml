driver: gnatcheck
format: brief
input_sources:
  - main.adb
tests:
  - label: In rule options
    rules:
      - +R:same_alias:goto_statements
      - +R:same_alias:integer_types_as_enum
  - label: In command-line
    extra_args:
      - -r
      - goto_statements
      - goto_statements
  - label: In command-line and rule options
    extra_args:
      - -r
      - goto_statements
    rule_file: rules.txt
